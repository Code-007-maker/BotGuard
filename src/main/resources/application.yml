spring:
  application:
    name: botguard

  datasource:
    url: jdbc:postgresql://localhost:5432/botguard_db
    username: botguard
    password: botguard_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
